<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ 'rtl' if lang == 'ar' else 'ltr' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNDP Crisis Response Damage Assessment</title>
    <style>
        :root {
            --undp-blue: #006EB5;
            --undp-white: #FFFFFF;
            --undp-light-gray: #F7F7F7;
            --undp-black: #212121;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--undp-white);
            color: var(--undp-black);
        }

        .logo-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            background: white;
        }

        .hero {
            /* Fixes the dead space */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 121px); 
            padding: 40px 20px;
            text-align: center;
            background-color: var(--undp-light-gray);
            box-sizing: border-box;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 3.5rem); /* Responsive sizing */
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.1;
        }

        .hero p {
            font-size: 1.25rem;
            max-width: 700px;
            margin: 0 auto 40px;
            line-height: 1.5;
        }

        .cta-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-report {
            background-color: var(--undp-blue);
            color: white;
            padding: 18px 36px;
            font-weight: 600;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-map {
            background-color: transparent;
            color: var(--undp-blue);
            padding: 18px 36px;
            font-weight: 600;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 2px solid var(--undp-blue);
        }
    </style>
</head>
<body>

    <header class="logo-header">
        <img src="/static/images/undp-logo-blue.png" alt="UNDP Logo" height="80">
    </header>

    <main>
        <section class="hero">
            <h1>Map Damage. <br>Accelerate Recovery.</h1>
            <p>
                In the first 48 hours of a crisis, your data is the most valuable tool for response. 
                Identify damaged buildings to help UNDP partners deploy aid where it is needed most.
            </p>

            <div class="cta-group">
                <a href="/report" class="btn-report">Submit Damage Report</a>
                <a href="/map" class="btn-map">View Community Map</a>
            </div>
        </section>
    </main>

</body>
</html>
