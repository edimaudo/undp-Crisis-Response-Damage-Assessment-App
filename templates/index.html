{% extends "base.html" %}

{% block title %}UNDP Crisis Response Damage Assessment Portal{% endblock %}

{% block content %}
<style>
    /* Specific styles only for the Hero section */
    .hero {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 70vh; 
        padding: 40px 20px;
        text-align: center;
        box-sizing: border-box;
    }

    .hero h1 {
        font-size: clamp(2.2rem, 8vw, 3.5rem);
        font-weight: 700;
        margin-bottom: 24px;
        line-height: 1.2;
    }

    .hero p {
        font-size: 1.25rem;
        max-width: 65ch; 
        margin: 0 auto 40px;
    }

    .cta-group {
        display: flex;
        gap: 20px;
        justify-content: center;
        flex-wrap: wrap;
    }

    /* Primary Action Button */
    .btn-report {
        background-color: var(--undp-blue);
        color: white;
        padding: 18px 36px;
        font-weight: 700;
        text-decoration: none;
        text-transform: uppercase;
        border: 2px solid var(--undp-blue);
        transition: transform 0.2s;
    }

    .btn-report:hover, .btn-report:focus {
        filter: brightness(90%);
        transform: scale(1.02);
    }

    /* Secondary Action Button */
    .btn-map {
        background-color: transparent;
        color: var(--undp-blue);
        padding: 18px 36px;
        font-weight: 700;
        text-decoration: none;
        text-transform: uppercase;
        border: 2px solid var(--undp-blue);
    }

    .btn-map:hover, .btn-map:focus {
        background-color: var(--undp-blue);
        color: white;
    }

    /* Accessibility: Ensure buttons adapt to Dark Mode via CSS Variables if needed */
    [data-theme="dark"] .btn-map {
        color: #89cff0;
        border-color: #89cff0;
    }
</style>

<section class="hero" aria-labelledby="hero-title">

    {% block content %}
<section class="hero" aria-labelledby="hero-title">
    <h1 id="hero-title">{{ labels.hero_title | safe }}</h1>
    <p>{{ labels.hero_subtitle }}</p>

<div class="cta-group">
    <a href="/report?lang={{ lang }}" 
       class="btn-report" 
       aria-label="{{ labels.aria_report }}">
        {{ labels.btn_report }}
    </a>

    <a href="/map?lang={{ lang }}" 
       class="btn-map" 
       aria-label="{{ labels.aria_map }}">
        {{ labels.btn_map }}
    </a>
</div>
</section>
{% endblock %}
