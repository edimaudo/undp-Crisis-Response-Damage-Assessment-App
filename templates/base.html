<!DOCTYPE html>
<html lang="{{ lang | default('en') }}" 
      dir="{{ 'rtl' if lang == 'ar' else 'ltr' }}" 
      data-theme="light" 
      data-size="medium">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--<title>{% block title %}UNDP Crisis Response{% endblock %}</title>-->
    
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --undp-blue: #006eb5;
            --ui-bg: #f8f9fa;
            --border-color: #ddd;
            --font-multiplier: 1rem;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #f5f5f5;
            --ui-bg: #1e1e1e;
            --border-color: #333;
        }

        /* Font Scaling Logic */
        [data-size="small"]  { --font-multiplier: 0.75rem; }
        [data-size="medium"] { --font-multiplier: 1.rem; }
        [data-size="large"]  { --font-multiplier: 1.25rem; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: var(--font-multiplier);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            transition: background 0.3s ease;
        }

        /* Skip Link for A11y */
        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: var(--undp-blue);
            color: white;
            padding: 8px;
            z-index: 100;
            transition: top 0.2s;
        }
        .skip-link:focus { top: 0; }

        /* Unified Header: Logo Left, Tools Right */
        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1.5rem;
            background: var(--bg-color);
            border-bottom: 2px solid var(--undp-blue);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo-container {
            display: flex;
            align-items: center;
        }

        /* Utility Bar: All tools on one line */
        .utility-bar {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-tool, .lang-select {
            padding: 8px 12px;
            background: var(--ui-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            height: 40px; /* Uniform height */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-tool:hover { border-color: var(--undp-blue); }

        main { padding: 2rem 1.5rem; max-width: 1000px; margin: 0 auto; min-height: 80vh; }
        
        footer { 
            padding: 2rem; 
            text-align: center; 
            border-top: 1px solid var(--border-color); 
            font-size: 0.85rem; 
            opacity: 0.7; 
        }

        /* RTL Adjustments */
        [dir="rtl"] .logo-container { order: 1; }
        [dir="rtl"] .utility-bar { order: 2; }
    </style>
</head>
<body>

    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header class="main-header" role="banner">
        <div class="logo-container">
            <img src="/static/images/undp-logo-blue.png" alt="UNDP Home" height="60">
        </div>

        <nav class="utility-bar" aria-label="Tools">
            <button class="btn-tool" onclick="toggleTheme()" title="Toggle Contrast">🌓</button>
            
            <div style="display:flex; gap:4px;">
                <button class="btn-tool" onclick="setFont('small')" title="Small Text">A-</button>  
                <button class="btn-tool" onclick="setFont('medium')" title="Normal Text">A</button>
                <button class="btn-tool" onclick="setFont('large')" title="Large Text">A+</button>
            </div>

<select class="lang-select" onchange="changeLanguage(this.value)" aria-label="Language">
    <option value="en" {{ 'selected' if lang == 'en' }}>English</option>
    <option value="ar" {{ 'selected' if lang == 'ar' }}>العربية</option>
    <option value="fr" {{ 'selected' if lang == 'fr' }}>Français</option>
    <option value="es" {{ 'selected' if lang == 'es' }}>Español</option>
    <option value="sw" {{ 'selected' if lang == 'sw' }}>Kiswahili</option>
    <option value="pt" {{ 'selected' if lang == 'pt' }}>Português</option>
</select>
        </nav>
    </header>

    <main id="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 United Nations Development Programme</p>
    </footer>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
        }

        function setFont(size) {
            document.documentElement.setAttribute('data-size', size);
            localStorage.setItem('font-size', size);
        }

        // Persistence Logic
        window.onload = () => {
            if(localStorage.getItem('theme')) document.documentElement.setAttribute('data-theme', localStorage.getItem('theme'));
            if(localStorage.getItem('font-size')) document.documentElement.setAttribute('data-size', localStorage.getItem('font-size'));
        }

         function changeLanguage(newLang) {
    // 1. Get current URL
    let url = new URL(window.location.href);
    // 2. Update the 'lang' parameter
    url.searchParams.set('lang', newLang);
    // 3. Reload the page with the new language
    window.location.href = url.toString();
} 
    </script>
</body>
</html>
