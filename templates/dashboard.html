<div class="dashboard-grid">
    <!-- Quick Stats Cards -->
    <article class="stat-card">
        <h3>Total Reports</h3>
        <p class="stat-number">{{ stats.total }}</p>
    </article>

    <!-- GIS Export Section -->
    <section class="export-tools">
        <h3>Data Export (GIS)</h3>
        <p>Download verified data for humanitarian clusters.</p>
        <div class="button-group">
            <a href="/api/export/geojson" class="btn-download">Download GeoJSON</a>
            <a href="/api/export/csv" class="btn-download">Download CSV (Excel)</a>
        </div>
    </section>

    <!-- Analytics Chart Placeholder -->
    <div class="chart-container">
        <canvas id="severityChart" aria-label="Bar chart showing damage distribution"></canvas>
    </div>
</div>
