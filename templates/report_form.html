<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ 'rtl' if lang == 'ar' else 'ltr' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Report | Crisis and Damage Response Assessment</title>
    </head>
<form id="crisis-report-form" action="/report" method="POST" enctype="multipart/form-data">
    
    <section id="essentials">
        <h2>Report Damage</h2>
        
        <div class="input-row">
            <button type="button" class="btn-gps" onclick="autoLocate()">Use My GPS</button>
            <div id="map-mini" style="height: 150px;"></div>
            <input type="hidden" name="lat" id="lat">
            <input type="hidden" name="lng" id="lng">
        </div>

        <div class="input-row">
            <label for="damage_photo" class="btn-camera-large">
                Tap to Take Photo
            </label>
            <input type="file" id="damage_photo" name="damage_photo" accept="image/*" capture="environment" hidden onchange="preview(this)">
            <img id="quick-preview" style="display:none; width: 100px; border-radius: 8px;">
        </div>

        <fieldset class="severity-picker">
            <legend class="sr-only">Severity</legend>
            <input type="radio" name="level" id="low" value="minor" hidden>
            <label for="low" class="chip">Minor</label>

            <input type="radio" name="level" id="mid" value="major" hidden>
            <label for="mid" class="chip">Major</label>

            <input type="radio" name="level" id="high" value="destroyed" hidden>
            <label for="high" class="chip">Destroyed</label>
        </fieldset>
    </section>

    <hr aria-hidden="true">

    <details>
        <summary class="btn-text">+ Add building/area details (Optional)</summary>
        <div class="details-content">
            <label for="notes">Notes (Building or Hazards)</label>
            <textarea id="notes" name="notes" placeholder="e.g. Gas leak, road blocked..."></textarea>
        </div>
    </details>

    <button type="submit" class="btn-submit-final">Send Report</button>
</form>
