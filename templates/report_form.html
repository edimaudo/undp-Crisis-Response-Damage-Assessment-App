<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ 'rtl' if lang == 'ar' else 'ltr' }}">
<head>
    <meta charset="UTF-8">
    <title>Submit Damage Report | UNDP Damage Assessment</title>
    </head>
<body>
    <main id="main-content" class="container">
        <h1>Damage Assessment Form</h1>
        
        <div id="form-status" aria-live="polite" class="sr-only">Step 1 of 3: Location</div>

        <form action="/report" method="POST" id="damage-form">
            <fieldset id="step-1" class="form-step">
                <legend>Step 1: Incident Location</legend>
                <p>Please provide the coordinates of the damage.</p>
                <label for="lat">Latitude:</label>
                <input type="number" step="any" name="lat" id="lat" required aria-required="true">
                
                <label for="lng">Longitude:</label>
                <input type="number" step="any" name="lng" id="lng" required aria-required="true">
                
                <button type="button" onclick="goToStep(2)">Next: Assess Damage</button>
            </fieldset>

            <fieldset id="step-2" class="form-step" style="display:none;">
                <legend>Step 2: Damage Severity</legend>
                <p>Select the level of destruction observed.</p>
                
                <input type="radio" name="damage_level" id="low" value="minor" required>
                <label for="low">Minor (Habitable)</label><br>
                
                <input type="radio" name="damage_level" id="high" value="destroyed">
                <label for="high">Destroyed (Structural Failure)</label>
                
                <button type="button" onclick="goToStep(1)">Back</button>
                <button type="button" onclick="goToStep(3)">Next: Contact Info</button>
            </fieldset>

            <fieldset id="step-3" class="form-step" style="display:none;">
                <legend>Step 3: Finalize Report</legend>
                <label for="reporter_name">Reporter Name (Optional):</label>
                <input type="text" name="reporter_name" id="reporter_name">
                
                <button type="button" onclick="goToStep(2)">Back</button>
                <button type="submit" class="btn-report">Submit Formal Report</button>
            </fieldset>
        </form>
    </main>

    <script>
        function goToStep(step) {
            document.querySelectorAll('.form-step').forEach(s => s.style.display = 'none');
            document.getElementById('step-' + step).style.display = 'block';
            document.getElementById('form-status').innerText = "Step " + step + " of 3";
        }
    </script>
</body>
</html>
