{% extends "base.html" %}

{% block title %}{{ labels.report_form_title }} | UNDP Crisis Response{% endblock %}

{% block content %}
<style>
    .report-container { max-width: 600px; margin: 0 auto; }
    .form-section { margin-bottom: 2rem; }
    
    .btn-action-large {
        display: block; width: 100%; padding: 1.2rem; 
        font-size: 1.1rem; text-align: center; border-radius: 4px;
        cursor: pointer; font-weight: bold; box-sizing: border-box;
        border: none;
    }

    /* Neutral Utility Style */
    .btn-gps-neutral { 
        background: var(--ui-bg); 
        color: var(--text-color); 
        border: 1px solid var(--border-color);
        padding: 0 15px; border-radius: 4px; cursor: pointer;
    }

    /* Primary Action Style (UNDP Blue) */
    .btn-primary-action { 
        background-color: var(--undp-blue); 
        color: white; 
    }

    .location-input-group { display: flex; gap: 8px; margin-bottom: 8px; }

    .severity-picker { display: flex; gap: 10px; border: none; padding: 0; margin: 1rem 0; }
    .chip {
        flex: 1; padding: 1rem 0; text-align: center; font-weight: bold;
        background: var(--ui-bg); border-radius: 4px; border: 2px solid var(--border-color); cursor: pointer;
    }
    input[type="radio"]:checked + .chip { 
        border-color: var(--undp-blue); background: var(--undp-blue); color: white;
    }

    textarea, .text-input { 
        width: 100%; padding: 1rem; border-radius: 4px; 
        border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-color);
        box-sizing: border-box; font-size: 1rem;
    }

    #location-status { font-size: 0.85rem; margin-top: 5px; display: block; color: #666; }
</style>

<div class="report-container">
    <h2>{{ labels.report_form_title }}</h2>
    <p>{{ labels.report_form_subtitle }}</p>

    <form action="/report?lang={{ lang }}" method="POST" enctype="multipart/form-data">
        
        <div class="form-section">
            <label style="font-weight:bold">{{ labels.label_location_details }}</label>
            <div class="location-input-group">
                <input type="text" id="location_text" name="location_text" 
                       class="text-input" placeholder="{{ labels.placeholder_location }}" 
                       required oninput="updateLocationStatus('manual')">
                
                <button type="button" class="btn-gps-neutral" onclick="getLocation()" id="detect-btn">
                    {{ labels.btn_detect }}
                </button>
            </div>
            <input type="hidden" name="lat" id="lat">
            <input type="hidden" name="lng" id="lng">
            <span id="location-status">{{ labels.status_awaiting_input }}</span>
        </div>

        <div class="form-section">
            <label for="damage_photo" class="btn-action-large btn-primary-action">
                {{ labels.label_take_photo }}
            </label>
            <input type="file" id="damage_photo" name="damage_photo" accept="image/*" capture="environment" style="display:none" onchange="previewImage(this)">
            <div id="preview-container" style="margin-top:10px; display:none;">
                <img id="img-preview" style="width:100%; border-radius:4px;" alt="Preview">
            </div>
        </div>

        <div class="form-section">
            <label style="font-weight:bold">{{ labels.label_severity }}</label>
            <fieldset class="severity-picker">
                <input type="radio" name="level" id="minor" value="minor" style="display:none" required>
                <label for="minor" class="chip">{{ labels.sev_minor }}</label>

                <input type="radio" name="level" id="major" value="major" style="display:none">
                <label for="major" class="chip">{{ labels.sev_major }}</label>

                <input type="radio" name="level" id="destroyed" value="destroyed" style="display:none">
                <label for="destroyed" class="chip">{{ labels.sev_destroyed }}</label>
            </fieldset>
        </div>

        <div class="form-section">
            <label for="notes" style="font-weight:bold">{{ labels.label_details }}</label>
            <textarea id="notes" name="notes" rows="4" placeholder="{{ labels.placeholder_notes }}" required></textarea>
        </div>

        <button type="submit" class="btn-action-large btn-primary-action" style="font-size: 1.25rem; margin-top: 1rem;">
            {{ labels.btn_submit_report }}
        </button>
    </form>
</div>

<script>
    function updateLocationStatus(type) {
        const status = document.getElementById('location-status');
        if (type === 'gps') {
            status.style.color = "#28a745";
            status.innerText = "{{ labels.status_gps_verified }}";
        } else {
            status.style.color = "var(--undp-blue)";
            status.innerText = "{{ labels.status_manual_entry }}";
            // Clear coordinates to ensure manual text is the source of truth
            document.getElementById('lat').value = "";
            document.getElementById('lng').value = "";
        }
    }

    async function getLocation() {
        const btn = document.getElementById('detect-btn');
        const textInput = document.getElementById('location_text');

        if (navigator.geolocation) {
            btn.disabled = true;
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                document.getElementById('lat').value = lat;
                document.getElementById('lng').value = lng;
                
                updateLocationStatus('gps');
                btn.disabled = false;

                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
                    const data = await res.json();
                    if(data.display_name) textInput.value = data.display_name;
                } catch(e) {
                    textInput.value = lat.toFixed(5) + ", " + lng.toFixed(5);
                }
            }, (err) => {
                btn.disabled = false;
                updateLocationStatus('manual');
            });
        }
    }

    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('img-preview').src = e.target.result;
                document.getElementById('preview-container').style.display = 'block';
            }
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
{% endblock %}
