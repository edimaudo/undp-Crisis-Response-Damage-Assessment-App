{% extends "base.html" %}

{% block title %}{{ labels.btn_report }} | UNDP Crisis Response{% endblock %}

{% block content %}
<style>
    .report-container { max-width: 600px; margin: 0 auto; }
    .form-section { margin-bottom: 2rem; }
    
    /* Ensuring all action buttons have the exact same width and alignment */
    .btn-action-large {
        display: block; 
        width: 100%; 
        padding: 1.2rem; 
        font-size: 1.1rem; 
        text-align: center; 
        border-radius: 4px;
        border: 1px solid var(--border-color); 
        cursor: pointer; 
        font-weight: bold;
        box-sizing: border-box; /* Critical for alignment */
    }

    .btn-gps { background: var(--ui-bg); color: var(--text-color); }
    .btn-camera { background: var(--ui-bg); color: var(--text-color); }
    
    .severity-picker { display: flex; gap: 10px; border: none; padding: 0; margin: 1rem 0; }
    .chip {
        flex: 1; padding: 1rem 0; text-align: center; font-weight: bold;
        background: var(--ui-bg); border-radius: 4px; border: 2px solid var(--border-color); cursor: pointer;
    }
    
    /* Severity Selection Highlight */
    input[type="radio"]:checked + .chip { 
        border-color: var(--undp-blue); 
        background: var(--undp-blue);
        color: white;
    }

    textarea { 
        width: 100%; padding: 1rem; border-radius: 4px; 
        border: 1px solid var(--border-color); background: var(--bg-color); color: var(--text-color);
        box-sizing: border-box; font-size: 1rem;
    }

    .btn-submit-final { 
        background-color: var(--undp-blue); /* Changed from Red to Professional Blue */
        color: white; 
        font-size: 1.25rem; 
        margin-top: 2rem; 
        border: none; 
        width: 100%; 
        padding: 1.2rem; 
        border-radius: 4px; 
        cursor: pointer;
        font-weight: bold;
    }
</style>

<div class="report-container">
    <h2>{{ labels.report_form_title }}</h2>
    <p>{{ labels.report_form_subtitle }}</p>

    <form action="/report?lang={{ lang }}" method="POST" enctype="multipart/form-data">
        
        <div class="form-section">
            <button type="button" class="btn-action-large btn-gps" onclick="getLocation()" id="gps-btn">
                {{ labels.label_get_location }}
            </button>
            <input type="hidden" name="lat" id="lat" required>
            <input type="hidden" name="lng" id="lng" required>
        </div>

        <div class="form-section">
            <label for="damage_photo" class="btn-action-large btn-camera">
                {{ labels.label_take_photo }}
            </label>
            <input type="file" id="damage_photo" name="damage_photo" accept="image/*" capture="environment" style="display:none" onchange="previewImage(this)">
            <div id="preview-container" style="margin-top:10px; display:none;">
                <img id="img-preview" style="width:100%; border-radius:4px;" alt="Image Preview">
            </div>
        </div>

        <div class="form-section">
            <label style="font-weight:bold">{{ labels.label_severity }}</label>
            <fieldset class="severity-picker">
                <input type="radio" name="level" id="minor" value="minor" style="display:none" required>
                <label for="minor" class="chip">{{ labels.sev_minor }}</label>

                <input type="radio" name="level" id="major" value="major" style="display:none">
                <label for="major" class="chip">{{ labels.sev_major }}</label>

                <input type="radio" name="level" id="destroyed" value="destroyed" style="display:none">
                <label for="destroyed" class="chip">{{ labels.sev_destroyed }}</label>
            </fieldset>
        </div>

        <div class="form-section">
            <label for="notes" style="font-weight:bold">{{ labels.label_details }}</label>
            <textarea id="notes" name="notes" rows="4" placeholder="{{ labels.placeholder_notes }}" required></textarea>
        </div>

        <button type="submit" class="btn-submit-final">{{ labels.btn_submit_report }}</button>
    </form>
</div>

<script>
    function getLocation() {
        const btn = document.getElementById('gps-btn');
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    document.getElementById('lat').value = pos.coords.latitude;
                    document.getElementById('lng').value = pos.coords.longitude;
                    btn.style.background = "#28a745";
                    btn.style.color = "white";
                    btn.innerText = "{{ labels.location_captured }}";
                },
                (error) => {
                    // Feedback if GPS is blocked or fails
                    console.error(error);
                    alert("Error: Please enable location services in your browser settings to capture coordinates.");
                }
            );
        } else {
            alert("Geolocation is not supported by this browser.");
        }
    }

    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('img-preview').src = e.target.result;
                document.getElementById('preview-container').style.display = 'block';
            }
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
{% endblock %}
